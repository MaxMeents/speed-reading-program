    const total = size*size;
    oddIdx = randInt(0, total-1);
    const g = document.createElement('div');
    g.className = 'intruder-grid';
    g.style.gridTemplateColumns = `repeat(${size},1fr)`;
    for (let i = 0; i < total; i++) {
      const c = document.createElement('div');
      c.className = 'intruder-cell';
      c.textContent = i === oddIdx ? pair.odd : pair.base;
      c.addEventListener('click', () => {
        if (i === oddIdx) {
          const t = (performance.now() - startT)/1000;
          c.classList.add('hit');
          playBeep(1000, 80, 0.05);
          best = Math.min(best, t);
          root.querySelector('#best').textContent = best.toFixed(2)+'s';
          state.stats.intruder.push({ time: t, size, date: Date.now() });
          saveState();
          toast(`Found in ${t.toFixed(2)}s`);
          setTimeout(() => { render(); }, 700);
        } else {
          c.style.borderColor = 'var(--hot)';
          setTimeout(() => c.style.borderColor = '', 200);
        }
      });
      g.appendChild(c);
    }
    host.innerHTML = '';
    host.appendChild(g);
    startT = performance.now();
    tick();
  }
  function tick() {
    root.querySelector('#tm').textContent = ((performance.now()-startT)/1000).toFixed(1)+'s';
    if (currentPage === 'intruder') requestAnimationFrame(tick);
  }
  root.querySelector('#inSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    root.querySelectorAll('#inSeg button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    size = +b.dataset.v;
    render();
  });
  root.querySelector('#newR').addEventListener('click', render);
  render();
}

/* =========================================================
   STATS / PROGRESS
   ========================================================= */
function mountStats(root) {
  const s = state.stats;
  root.innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">Progress <span class="page-title-accent">Telemetry</span></h1>
        <div class="page-subtitle">// your training history</div>
      </div>
    </div>

    <div class="grid grid-4">
      <div class="card card-accent stat"><div class="stat-label">Best WPM</div><div class="stat-value">${s.bestWpm || 0}</div></div>
      <div class="card card-accent stat"><div class="stat-label">Sessions</div><div class="stat-value">${s.sessions}</div></div>
      <div class="card card-accent stat"><div class="stat-label">Words read</div><div class="stat-value">${s.totalWords.toLocaleString()}</div></div>
      <div class="card card-accent stat"><div class="stat-label">Time trained</div><div class="stat-value">${Math.round(s.totalMinutes)}<span class="stat-unit">min</span></div></div>
    </div>

    <div class="card card-accent mt-24">
      <div class="card-head"><div class="card-title">WPM trend</div><span class="card-sub">reading sessions</span></div>
      <canvas id="chart" width="1100" height="260" style="width:100%;height:260px"></canvas>
    </div>

    <div class="grid grid-2 mt-24">
      <div class="card">
        <div class="card-head"><div class="card-title">Recent reading sessions</div></div>
        ${s.reading.length ? s.reading.slice(-10).reverse().map(r => `
          <div class="row spread" style="padding:10px 0; border-bottom:1px solid var(--border)">
            <div style="font-size:13px;">${escapeHtml(r.title)}</div>
            <div class="mono accent">${r.wpm} wpm</div>
          </div>
        `).join('') : '<div class="text-3">No sessions yet.</div>'}
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">Game records</div></div>
        <div class="row spread" style="padding:10px 0; border-bottom:1px solid var(--border)">
          <div>Schulte 5×5 (best)</div>
          <div class="mono accent">${(() => { const b = s.schulte.filter(x=>x.size===5).sort((a,b)=>a.time-b.time)[0]; return b ? b.time.toFixed(1)+'s' : '—'; })()}</div>
        </div>
        <div class="row spread" style="padding:10px 0; border-bottom:1px solid var(--border)">
          <div>Tachistoscope sessions</div>
          <div class="mono accent">${s.flash.length}</div>
        </div>
        <div class="row spread" style="padding:10px 0; border-bottom:1px solid var(--border)">
          <div>Stroop (best acc)</div>
          <div class="mono accent">${(() => { const b = s.stroop.sort((a,b)=> (b.correct/b.total)-(a.correct/a.total))[0]; return b ? Math.round(b.correct/b.total*100)+'%' : '—'; })()}</div>
        </div>
        <div class="row spread" style="padding:10px 0; border-bottom:1px solid var(--border)">
          <div>N-Back attempts</div>
          <div class="mono accent">${s.nback.length}</div>
        </div>
        <div class="row spread" style="padding:10px 0; border-bottom:1px solid var(--border)">
          <div>Odd Word sets</div>
          <div class="mono accent">${s.odd.length}</div>
        </div>
        <div class="row spread" style="padding:10px 0;">
          <div>Intruder rounds</div>
          <div class="mono accent">${s.intruder.length}</div>
        </div>
      </div>
    </div>
  `;
  // Draw WPM chart
  const canvas = root.querySelector('#chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = 260;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr, dpr);
  const data = s.reading.slice(-30).map(r => r.wpm);
  if (!data.length) {
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-3');
    ctx.font = '12px "JetBrains Mono"';
    ctx.fillText('No data yet — complete a reading session.', 20, 40);
    return;
  }
  const max = Math.max(...data, 400), min = Math.min(...data, 0);
  const pad = 24;
  // axes grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad + (h-2*pad) * i/4;
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(w-pad, y); ctx.stroke();
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-3');
    ctx.font = '10px "JetBrains Mono"';
    const val = Math.round(max - (max-min)*i/4);
    ctx.fillText(val+'', 4, y+3);
  }
  // line
  const grad = ctx.createLinearGradient(0,0,w,0);
  grad.addColorStop(0, '#0A84FF');
  grad.addColorStop(1, '#00D9FF');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 3;
  ctx.shadowColor = '#0A84FF';
  ctx.shadowBlur = 18;
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = pad + (w-2*pad) * (data.length>1 ? i/(data.length-1) : 0.5);
    const y = pad + (h-2*pad) * (1 - (v-min)/(max-min || 1));
    if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Points
  ctx.shadowBlur = 0;
  data.forEach((v, i) => {
    const x = pad + (w-2*pad) * (data.length>1 ? i/(data.length-1) : 0.5);
    const y = pad + (h-2*pad) * (1 - (v-min)/(max-min || 1));
    ctx.fillStyle = '#0A84FF';
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  });
}

        <div class="page-subtitle">// global defaults applied across every module</div>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card card-accent">
        <div class="card-head"><div class="card-title">Reading</div><span class="card-sub">rsvp & pacer</span></div>

        <label class="label">Target WPM</label>
        <div class="range-wrap">
          <input type="range" min="100" max="1000" step="10" value="${s.wpm}" class="range" data-set="wpm"/>

        </div>

          <input type="range" min="0.5" max="4" step="0.1" value="${s.pacerSpeed}" class="range" data-set="pacerSpeed"/>
          <span class="range-value" data-setv="pacerSpeed">${s.pacerSpeed.toFixed(1)}</span>
        </div>

        <div class="mt-16 row spread"><span class="label" style="margin:0">ORP red highlight</span><div class="toggle ${s.orp?'on':''}" data-tg="orp"></div></div>
        <div class="mt-16 row spread"><span class="label" style="margin:0">Pause on punctuation</span><div class="toggle ${s.punctuationPause?'on':''}" data-tg="punctuationPause"></div></div>
        <div class="mt-16 row spread"><span class="label" style="margin:0">Bionic bolding</span><div class="toggle ${s.bionic?'on':''}" data-tg="bionic"></div></div>
        <div class="mt-16 row spread"><span class="label" style="margin:0">Metronome click (pacer)</span><div class="toggle ${s.metronome?'on':''}" data-tg="metronome"></div></div>
      </div>

        <label class="label">Schulte default size</label>
        <div class="seg" data-segset="schulteSize">
          ${[3,5,7].map(v => `<button data-v="${v}" class="${v===s.schulteSize?'active':''}">${v}×${v}</button>`).join('')}
        </div>

            <button data-v="dark" class="${s.theme==='dark'?'active':''}">Dark</button>
            <button data-v="light" class="${s.theme==='light'?'active':''}">Light</button>
          </div>

          <button class="btn" id="imp">Import JSON</button>

      const vEl = root.querySelector(`[data-setv="${k}"]`);
      if (k === 'pacerSpeed') vEl.textContent = v.toFixed(1);
      else vEl.textContent = v;
      saveState();
    });
  });
  // toggles
  root.querySelectorAll('[data-tg]').forEach(t => {
    t.addEventListener('click', () => {
      const k = t.dataset.tg;
      state.settings[k] = !state.settings[k];
      t.classList.toggle('on');
      saveState();
    });
  });
  // segments
  root.querySelectorAll('[data-segset]').forEach(seg => {
    seg.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      [...seg.querySelectorAll('button')].forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      const k = seg.dataset.segset;
      state.settings[k] = +b.dataset.v;
      saveState();
    });
  });
  // theme
  root.querySelector('#themeSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    root.querySelectorAll('#themeSeg button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.settings.theme = b.dataset.v;
    saveState();
    applyTheme();
  });
  // data
  root.querySelector('#exp').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'velocity_data.json'; a.click();
    URL.revokeObjectURL(url);
  });
  root.querySelector('#imp').addEventListener('click', () => root.querySelector('#impFile').click());
  root.querySelector('#impFile').addEventListener('change', async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try {
      const data = JSON.parse(await f.text());
      state = Object.assign(structuredClone(DEFAULT_STATE), data);
      saveState();
      applyTheme();
      renderPage('settings');
      toast('Imported');
    } catch(err){ toast('Invalid file'); }
  });
  root.querySelector('#clr').addEventListener('click', () => {
    if (confirm('Clear all stats and settings?')) {
      localStorage.removeItem(STATE_KEY);
      state = loadState();
      applyTheme();
      renderPage('settings');
      toast('Cleared');
    }
  });
}
</script>
